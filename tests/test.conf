# Test configuration for QWEB
[sge]
source_settings = source /my/custom/sge/settings.sh
sge_root = /opt/sge
sge_cell = prod

[directory]
backend = ldap

[ldap]
uri = ldap://ldap.mycompany.com
base_dn = dc=mycompany,dc=com
bind_dn = cn=admin,dc=mycompany,dc=com
bind_password = secret123
use_ssl = true